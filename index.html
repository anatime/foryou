<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-balloon">
        <div class="balloon" style="--bg: #ff85a2; --delay: 0s; --left: 10%;"></div>
        <div class="balloon" style="--bg: #a2d2ff; --delay: 2s; --left: 30%;"></div>
        <div class="balloon" style="--bg: #ffd166; --delay: 1s; --left: 70%;"></div>
        <div class="balloon" style="--bg: #06d6a0; --delay: 3s; --left: 90%;"></div>
    </div>

    <div class="card">
        <div class="photo-frame">
           <img src="foto.jpeg" alt="Foto Spesial" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        
        <h1>UHUYYYY, HAPPY BIRTHDAY AYANGKUUU🥳</h1>
        <p class="typing-text">
    Happy birthday to the person who is always in my thoughts and prayers. <br>
    This special day is entirely yours. <br>
    May all the goodness and happiness come to you today, tomorrow, and forever.
</p>
        
        <button class="btn" id="btnKejutan">Tap to Open ✨</button>
        
        <div id="special-message" class="hidden">
            <p>I promise to be more patient and to love you even more every single day ❤️❤️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
